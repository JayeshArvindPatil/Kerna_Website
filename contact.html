<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Kerna</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script defer src="js/theme.js"></script>
</head>

<body>

    <header>
        <div class="container nav">
            <h2>Kerna</h2>
            <nav>
                <a href="index.html">Home</a>
                <a href="work.html">Work</a>
                <a href="careers.html">Careers</a>
                <a href="contact.html" class="active">Contact</a>
                <button id="themeToggle"><i class="fa-solid fa-moon"></i></button>
            </nav>
        </div>
    </header>


    <section class="section container">

        <h1>Contact / Apply for Internship</h1>

        <div class="contact-grid">

            <div class="contact-info">

                <h3>Get in Touch</h3>

                <p><i class="fa-solid fa-phone"></i> +91 75696 12318</p>
                <p><i class="fa-solid fa-phone"></i> +91 99496 86160</p>
                <p><i class="fa-solid fa-location-dot"></i> Marripalem, Visakhapatnam</p>

                <h3 style="margin-top:30px;">Office Location</h3>

                <iframe src="https://www.google.com/maps?q=17.74319497588421,83.24420142282327&output=embed"
                    loading="lazy">
                </iframe>

            </div>

            <div class="contact-form">

                <form id="applyForm">

                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name" required>

                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email address" required>

                    <label>Role Applying For</label>
                    <select required>
                        <option value="">Select a role</option>
                        <option>Web Development Intern</option>
                        <option>Marketing / Sales Intern</option>
                        <option>Branding & Research Intern</option>
                    </select>

                    <label>Portfolio / GitHub / LinkedIn</label>
                    <input type="text" placeholder="Paste your profile link">

                    <label>Short Message</label>
                    <textarea placeholder="Tell us about yourself"></textarea>

                    <button class="btn">Submit Application</button>

                </form>

            </div>

        </div>

    </section>


    <footer>
        <div class="container">

            <p>© 2026 Kerna Marketing Agency</p>

            <div class="footer-nav">
                <a href="index.html">Home</a>
                <a href="work.html">Work</a>
                <a href="careers.html">Careers</a>
                <a href="contact.html">Contact</a>
            </div>

        </div>
    </footer>

</body>

</html>
